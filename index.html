<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Produtos - API</title>
    <!-- Tailwind CSS (via CDN for simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col items-center p-6">

    <header class="w-full max-w-4xl mb-8 text-center fade-in">
        <h1 class="text-4xl font-bold text-indigo-600 mb-2">Busca Inteligente de Produtos</h1>
        <p class="text-gray-500">Conecte-se à sua API local e encontre produtos instantaneamente.</p>
    </header>

    <main class="w-full max-w-4xl bg-white rounded-2xl shadow-xl p-8 fade-in" style="animation-delay: 0.1s;">

        <!-- Configuração da API -->
        <div
            class="mb-8 p-4 bg-indigo-50 rounded-lg border border-indigo-100 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="flex items-center gap-2 w-full md:w-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <label for="apiUrl" class="font-semibold text-indigo-700 whitespace-nowrap">Endpoint da API:</label>
            </div>
            <input type="text" id="apiUrl" value=""
                class="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-300 w-full"
                placeholder="Deixe vazio para usar a própria URL">
            <button onclick="testConnection()"
                class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition shadow-md whitespace-nowrap">Testar
                Conexão</button>
        </div>

        <div id="statusMessage" class="hidden text-center mb-4 text-sm font-semibold"></div>

        <!-- Busca -->
        <div class="relative mb-8">
            <input type="text" id="searchInput"
                class="w-full p-4 pl-12 border border-gray-200 rounded-xl shadow-inner text-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
                placeholder="Digite o nome do produto (ex: Capa iPhone 13)..." onkeypress="handleKeyPress(event)">
            <svg xmlns="http://www.w3.org/2000/svg"
                class="h-6 w-6 text-gray-400 absolute left-4 top-1/2 transform -translate-y-1/2" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <button onclick="searchProducts()"
                class="absolute right-2 top-1/2 transform -translate-y-1/2 px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition shadow-md font-semibold">Buscar</button>
        </div>

        <!-- Resultados -->
        <div id="resultsArea" class="space-y-4">
            <!-- Resultados aparecerão aqui -->
            <div class="text-center text-gray-400 py-10">
                Os resultados da sua busca aparecerão aqui.
            </div>
        </div>

    </main>

    <footer class="mt-10 text-gray-400 text-sm">
        &copy; 2026 Extração de PDF & API
    </footer>

    <script>
        // Carregar URL salva se existir
        window.onload = function () {
            const savedUrl = localStorage.getItem('apiBaseUrl');
            if (savedUrl) {
                document.getElementById('apiUrl').value = savedUrl;
            }
        };

        async function testConnection() {
            const baseUrl = document.getElementById('apiUrl').value.replace(/\/$/, ''); // Remove trailing slash
            const statusEl = document.getElementById('statusMessage');

            statusEl.classList.remove('hidden', 'text-green-600', 'text-red-600');
            statusEl.textContent = 'Testando...';

            try {
                // If baseUrl is empty, assume relative path handling or current origin
                const urlToFetch = baseUrl ? `${baseUrl}/info` : '/info';
                const response = await fetch(urlToFetch);
                if (response.ok) {
                    const data = await response.json();
                    statusEl.textContent = `Conectado! ${data.message} (${data.total_products} produtos)`;
                    statusEl.classList.add('text-green-600');
                    if (baseUrl) localStorage.setItem('apiBaseUrl', baseUrl);
                } else {
                    throw new Error('Erro na resposta da API');
                }
            } catch (error) {
                statusEl.textContent = `Falha na conexão: ${error.message}. Verifique se a API está rodando.`;
                statusEl.classList.add('text-red-600');
            }
            statusEl.classList.remove('hidden');
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                searchProducts();
            }
        }

        async function searchProducts() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const baseUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');
            const resultsArea = document.getElementById('resultsArea');

            resultsArea.innerHTML = '<div class="text-center py-10"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div><p class="mt-2 text-gray-500">Buscando...</p></div>';

            try {
                const searchUrl = baseUrl ? `${baseUrl}/search?query=${encodeURIComponent(query)}` : `/search?query=${encodeURIComponent(query)}`;
                const response = await fetch(searchUrl);
                if (!response.ok) throw new Error('Erro na busca');

                const data = await response.json();

                resultsArea.innerHTML = '';

                if (data.results.length === 0) {
                    resultsArea.innerHTML = '<div class="text-center text-gray-500 py-10">Nenhum produto encontrado para "' + query + '".</div>';
                    return;
                }

                const countEl = document.createElement('div');
                countEl.className = 'text-sm text-gray-500 mb-2';
                countEl.textContent = `${data.count} produtos encontrados`;
                resultsArea.appendChild(countEl);

                data.results.forEach((product, index) => {
                    const item = document.createElement('div');
                    item.className = 'bg-white border border-gray-100 p-4 rounded-lg shadow-sm hover:shadow-md transition flex justify-between items-center fade-in';
                    item.style.animationDelay = `${index * 0.05}s`;

                    const priceFormatted = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(parseFloat(product.price_sight));

                    item.innerHTML = `
                        <div>
                            <div class="text-xs text-indigo-500 font-bold mb-1">CÓD: ${product.id}</div>
                            <h3 class="font-semibold text-gray-800">${product.description}</h3>
                            <div class="text-xs text-gray-400 mt-1">Unidade: ${product.unit}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-lg font-bold text-green-600">${priceFormatted}</div>
                            <div class="text-xs text-gray-400">À Vista</div>
                        </div>
                    `;
                    resultsArea.appendChild(item);
                });

            } catch (error) {
                resultsArea.innerHTML = `<div class="text-center text-red-500 py-10">Erro ao buscar: ${error.message}</div>`;
            }
        }
    </script>
</body>

</html>
